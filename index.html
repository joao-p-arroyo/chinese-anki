<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanzi Anki</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold"> Hanzi Anki</h1>
        <span id="card-count" class="text-sm bg-blue-700 px-2 py-1 rounded">0 Due</span>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-4 max-w-md mx-auto w-full">
        <div id="flashcard" class="bg-white rounded-2xl shadow-xl w-full p-8 min-h-[300px] flex flex-col justify-between items-center text-center hidden">
            <div class="w-full">
                <div id="card-front" class="text-6xl font-bold my-8 text-slate-900">字</div>
                
                <div id="card-back" class="hidden border-t pt-4 w-full">
                    <div id="card-pinyin" class="text-2xl text-blue-600 font-medium mb-2">zì</div>
                    <div id="card-meaning" class="text-lg text-slate-600">character; word</div>
                </div>
            </div>

            <div id="action-zone" class="w-full mt-6">
                <button id="btn-show" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition">
                    Show Answer
                </button>
                
                <div id="sm2-buttons" class="hidden grid grid-cols-4 gap-2">
                    <button data-q="0" class="bg-red-500 text-white py-2 px-1 text-xs font-bold rounded-lg">Forgot</button>
                    <button data-q="2" class="bg-orange-500 text-white py-2 px-1 text-xs font-bold rounded-lg">Hard</button>
                    <button data-q="4" class="bg-green-500 text-white py-2 px-1 text-xs font-bold rounded-lg">Good</button>
                    <button data-q="5" class="bg-emerald-600 text-white py-2 px-1 text-xs font-bold rounded-lg">Easy</button>
                </div>
            </div>
        </div>

        <div id="empty-state" class="text-center p-6">
            <p class="text-xl font-semibold text-slate-600">🎉 All caught up for today!</p>
            <p class="text-sm text-slate-400 mt-2">Check back tomorrow or add more cards.</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
